# Workflow: Lint NDJSON Registry Files
# Purpose: Validate registry entries against schema, check IDs and references
# Triggers: push, pull_request, workflow_dispatch
# Usage: Reusable across constellation repos for registry consistency

name: Registry Lint

on:
  push:
    paths:
      - "schemas/**"
      - "registry/**"
      - "tooling/python/**"
      - ".github/workflows/registry-lint.yml"
  pull_request:
    paths:
      - "schemas/**"
      - "registry/**"
      - "tooling/python/**"
      - ".github/workflows/registry-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-registries:
    name: Lint NDJSON Registries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema typing-extensions

      - name: Generate schema spine index (check mode)
        run: |
          python tooling/python/cli/hpc-generate-spine-index.py --check

      - name: Lint all NDJSON registries (JSONL diagnostics)
        run: |
          python tooling/python/cli/hpc-lint-registry.py --json --summary > registry-lint-report.json

      - name: Upload lint report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: registry-lint-errors
          path: registry-lint-report.json
          retention-days: 7

      - name: Fail if any registry entry is invalid
        run: |
          if grep -q '"severity":"error"' registry-lint-report.json; then
            echo "::error::Registry linting failed. See registry-lint-report.json for details."
            exit 1
          fi
