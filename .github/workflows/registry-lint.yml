# Workflow: Lint NDJSON Registry Files
# Purpose: Validate registry entries against schema, check required fields, schemaref prefixes, deadledgerref presence
# Triggers: pull_request, workflow_dispatch
# Usage: Reusable across constellation repos for registry consistency

name: Registry Linting

on:
  pull_request:
    paths:
      - "registry/**/*.ndjson*"
      - "registry/**/*.example"
      - "schemas/registry/*.json"
      - "tooling/python/**/*.py"
      - ".github/workflows/registry-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-registries:
    name: Lint NDJSON Registries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema typing-extensions

      - name: Run registry linter over example and changed files
        run: |
          # Lint all .example files first (always)
          python tooling/python/cli/hpc-lint-registry.py \
            --mode batch \
            --root registry/ \
            --pattern "*.example" \
            --strict \
            --report registry-lint-report.json

          # If on PR, also lint changed .ndjson files
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | grep -E '\.ndjson$' || true)
            if [ -n "$CHANGED" ]; then
              echo "Linting changed registry files: $CHANGED"
              for f in $CHANGED; do
                python tooling/python/cli/hpc-lint-registry.py \
                  --mode file \
                  --file "$f" \
                  --strict \
                  --report registry-lint-report.json
              done
            fi
          fi

      - name: Upload lint report (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: registry-lint-errors
          path: registry-lint-report.json
          retention-days: 7

      - name: Fail if any registry entry is invalid
        run: |
          if [ -f registry-lint-report.json ]; then
            if grep -q '"valid": false' registry-lint-report.json; then
              echo "::error::Registry linting failed. See registry-lint-report.json for details."
              exit 1
            fi
          fi
