# Workflow: Constellation Pre-Commit Pack (Reusable)
# Purpose: Demonstrate how other repos can include this repo's validation tools as a reusable workflow
# Usage:
#   uses: Doctor0Evil/HorrorPlace-Constellation-Contracts/.github/workflows/constellation-precommit-pack.yml@main

name: Constellation Pre-Commit Pack

on:
  workflow_call:
    inputs:
      validate_schemas:
        description: "Run schema validation"
        required: false
        type: boolean
        default: true
      lint_registries:
        description: "Run registry linting"
        required: false
        type: boolean
        default: true
      validate_ai_authored:
        description: "Validate AI-generated contract cards"
        required: false
        type: boolean
        default: true
      python_version:
        description: "Python version to use"
        required: false
        type: string
        default: "3.11"
  workflow_dispatch:
    inputs:
      validate_schemas:
        description: "Run schema validation"
        required: false
        type: boolean
        default: true
      lint_registries:
        description: "Run registry linting"
        required: false
        type: boolean
        default: true
      validate_ai_authored:
        description: "Validate AI-generated contract cards"
        required: false
        type: boolean
        default: true
      python_version:
        description: "Python version to use"
        required: false
        type: string
        default: "3.11"

permissions:
  contents: read

jobs:
  precommit-pack:
    name: Run Pre-Commit Validation Pack
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["${{ inputs.python_version || '3.11' }}"]

    steps:
      - name: Checkout repository (caller or this repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema typing-extensions

      - name: Schema validation (optional)
        if: ${{ inputs.validate_schemas }}
        run: |
          python tooling/python/cli/hpc-validate-schema.py --json || exit 1

      - name: Registry linting (optional)
        if: ${{ inputs.lint_registries }}
        run: |
          python tooling/python/cli/hpc-lint-registry.py --json --summary || exit 1

      - name: AI authoring validation (optional)
        if: ${{ inputs.validate_ai_authored }}
        run: |
          if find .ai -name "*request*.json" | grep -q .; then
            find .ai -name "*request*.json" -print0 | xargs -0 -I {} \
              python tooling/python/schemaspine/aiauthoringvalidator.py request {}
          else
            echo "No ai-authoring-request files found under .ai/"
          fi
          if find .ai -name "*response*.json" | grep -q .; then
            find .ai -name "*response*.json" -print0 | xargs -0 -I {} \
              python tooling/python/schemaspine/aiauthoringvalidator.py response {}
          else
            echo "No ai-authoring-response files found under .ai/"
          fi

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: precommit-validation-logs
          path: |
            .
          retention-days: 7
