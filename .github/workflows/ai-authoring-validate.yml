# Workflow: Validate AI-Generated Contract Cards
# Purpose: Ensure any AI-authored file (policyEnvelope, regionContractCard, seedContractCard)
#          meets prismMeta, agentProfile, schema, and CHAT_DIRECTOR requirements.
# Triggers: push / pull_request on AI artifacts and schemas, workflow_dispatch.
# Usage: Enforces one-file-per-request rule and cross-field constraints.

name: AI Authoring Validation

on:
  push:
    paths:
      - ".ai/**"
      - "**/*ContractCard*.json"
      - "**/policyEnvelope*.json"
      - "schemas/**"
      - "tooling/python/**"
      - "src/**"
      - "Cargo.toml"
      - ".github/workflows/ai-authoring-validate.yml"
  pull_request:
    paths:
      - ".ai/**"
      - "**/*ContractCard*.json"
      - "**/policyEnvelope*.json"
      - "schemas/**"
      - "tooling/python/**"
      - "src/**"
      - "Cargo.toml"
      - ".github/workflows/ai-authoring-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ai-authoring-validate:
    name: AI Authoring Validate (.ai envelopes + CHAT_DIRECTOR)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build hpc-chat-director CLI
        run: |
          cargo build --bin hpc-chat-director

      - name: Generate schema spine index (check mode)
        run: |
          python tooling/python/cli/hpc-generate-spine-index.py --check

      - name: Validate AI authoring requests (.ai/)
        run: |
          if find .ai -name "*request*.json" | grep -q .; then
            find .ai -name "*request*.json" -print0 | xargs -0 -I {} \
              python tooling/python/schemaspine/aiauthoringvalidator.py request {}
          else
            echo "No ai-authoring-request files found under .ai/"
          fi

      - name: Validate AI authoring responses (.ai/, Python pre-flight)
        run: |
          if find .ai -name "*response*.json" | grep -q .; then
            find .ai -name "*response*.json" -print0 | xargs -0 -I {} \
              python tooling/python/schemaspine/aiauthoringvalidator.py response {}
          else
            echo "No ai-authoring-response files found under .ai/"
          fi

      - name: Validate AI authoring responses (.ai/, CHAT_DIRECTOR full validation)
        run: |
          if find .ai -name "*response*.json" | grep -q .; then
            for resp in $(find .ai -name "*response*.json"); do
              ./target/debug/hpc-chat-director validate-response \
                --from-file "$resp" \
                --format json \
                > "${resp%.json}.validated.json"
            done
          else
            echo "No ai-authoring-response files found under .ai/ for CHAT_DIRECTOR."
          fi

  validate-ai-authored-contract-cards:
    name: Validate AI Contract Cards (changed contract card files)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need history for diff

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema typing-extensions

      - name: Detect changed contract card / policy envelope files
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
            HEAD_SHA=${{ github.event.pull_request.head.sha }}
          else
            BASE_SHA=${{ github.sha }}^
            HEAD_SHA=${{ github.sha }}
          fi

          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '(ContractCard|policyEnvelope)\.json$' || true)
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          if [ -n "$CHANGED" ]; then
            echo "Found changed AI-authored contract card / policy envelope files:"
            echo "$CHANGED"
          else
            echo "No contract card or policy envelope changes detected; skipping per-file validation."
          fi

      - name: Run AI authoring validator on changed files
        if: steps.changed-files.outputs.changed != ''
        run: |
          rm -f ai-authoring-report.json
          for f in ${{ steps.changed-files.outputs.changed }}; do
            echo "Validating: $f"
            # Replace this call with a dedicated AI-authoring validator CLI
            # or a specific mode of an existing validator when available.
            python tooling/python/schemaspine/aiauthoringvalidator.py response "$f" || true
          done

      - name: Upload validation report (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ai-authoring-validation-errors
          path: ai-authoring-report.json
          retention-days: 7
