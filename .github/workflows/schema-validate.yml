# Workflow: Validate all JSON Schemas against JSON Schema Draft 2020-12
# Purpose: Ensure every .json file under schemas/ is valid JSON and conforms to its declared $schema
# Triggers: push, pull_request, workflow_dispatch
# Usage: Other repos can call this via:
#   uses: Doctor0Evil/HorrorPlace-Constellation-Contracts/.github/workflows/schema-validate.yml@main

name: Schema Validation

on:
  push:
    paths:
      - "schemas/**"
      - "tooling/python/**"
      - ".github/workflows/schema-validate.yml"
  pull_request:
    paths:
      - "schemas/**"
      - "tooling/python/**"
      - ".github/workflows/schema-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema typing-extensions

      - name: Validate JSON Schemas
        run: |
          python tooling/python/cli/hpc-validate-schema.py --json
