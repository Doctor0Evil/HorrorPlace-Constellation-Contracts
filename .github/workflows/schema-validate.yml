# Workflow: Validate all JSON Schemas against JSON Schema Draft
# Purpose: Ensure every .json file under schemas/ is valid JSON and conforms to its declared $schema
# Triggers: pull_request, workflow_dispatch
# Usage: Other repos can call this via uses: Doctor0Evil/HorrorPlace-Constellation-Contracts/.github/workflows/schema-validate.yml@main

name: Schema Validation

on:
  pull_request:
    paths:
      - "schemas/**/*.json"
      - "tooling/python/**/*.py"
      - ".github/workflows/schema-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema typing-extensions

      - name: Run schema validator over all schema files
        run: |
          python tooling/python/cli/hpc-validate-schema.py \
            --mode batch \
            --root schemas/ \
            --strict \
            --report schema-validation-report.json

      - name: Upload validation report (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: schema-validation-errors
          path: schema-validation-report.json
          retention-days: 7

      - name: Fail if any schema is invalid
        run: |
          if [ -f schema-validation-report.json ]; then
            if grep -q '"valid": false' schema-validation-report.json; then
              echo "::error::Schema validation failed. See schema-validation-report.json for details."
              exit 1
            fi
          fi
