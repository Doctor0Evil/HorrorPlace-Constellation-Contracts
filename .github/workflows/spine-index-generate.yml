# Workflow: Generate Schema Spine Index
# Purpose: Build schema-spine-index.json from all schemas in schemas/, mapping invariants/metrics to consumers
# Triggers: push to main, workflow_dispatch, scheduled weekly
# Output: schema-spine-index.json artifact (read-only, for reference)

name: Generate Schema Spine Index

on:
  push:
    branches:
      - main
    paths:
      - "schemas/**/*.json"
      - "tooling/python/**/*.py"
      - ".github/workflows/spine-index-generate.yml"
  workflow_dispatch:
  schedule:
    # Run weekly on Sundays at 03:00 UTC to catch drift
    - cron: "0 3 * * 0"

permissions:
  contents: read

jobs:
  generate-spine-index:
    name: Build Schema Spine Index
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema typing-extensions

      - name: Generate spine index
        run: |
          python tooling/python/cli/hpc-generate-spine-index.py \
            --root schemas/ \
            --output schema-spine-index.json \
            --format compact \
            --validate

      - name: Validate generated index against its own schema
        run: |
          python tooling/python/cli/hpc-validate-schema.py \
            --schema schemas/tooling/spineIndex.v1.json \
            --instance schema-spine-index.json \
            --strict

      - name: Upload spine index as artifact
        uses: actions/upload-artifact@v4
        with:
          name: schema-spine-index
          path: schema-spine-index.json
          retention-days: 30

      - name: Comment on PR if triggered by push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('schema-spine-index.json')) {
              const index = JSON.parse(fs.readFileSync('schema-spine-index.json', 'utf8'));
              const schemaCount = Object.keys(index.schemas || {}).length;
              const invariantCount = Object.keys(index.invariants || {}).length;
              const metricCount = Object.keys(index.metrics || {}).length;
              core.notice(`Schema spine index updated: ${schemaCount} schemas, ${invariantCount} invariants, ${metricCount} metrics`);
            }
