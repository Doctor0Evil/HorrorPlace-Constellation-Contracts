# Workflow: Generate Schema Spine Index
# Purpose: Build schema-spine-index-v1.json from schemas/core/, mapping invariants/metrics to consumers
# Triggers: push to main (schema/tooling changes), manual dispatch, weekly schedule
# Output: schema-spine-index-v1.json checked for drift; optional artifact for inspection

name: Spine Index Generate

on:
  push:
    branches:
      - main
    paths:
      - "schemas/**"
      - "tooling/python/**"
      - ".github/workflows/spine-index-generate.yml"
  workflow_dispatch:
  schedule:
    # Run weekly on Sundays at 03:00 UTC to catch drift
    - cron: "0 3 * * 0"

permissions:
  contents: read

jobs:
  generate-spine-index:
    name: Build Schema Spine Index
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema

      - name: Regenerate schema spine index (write)
        run: |
          python tooling/python/cli/hpc-generate-spine-index.py

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet; then
            echo "schema-spine-index-v1.json changed; commit updated index."
            git status --short
            exit 1
          fi

      - name: Upload spine index as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schema-spine-index-v1
          path: schemas/core/schema-spine-index-v1.json
          retention-days: 30
