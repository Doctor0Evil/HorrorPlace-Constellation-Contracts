# .github/workflows/update-search-index.yml
name: Update Search Index

on:
  push:
    paths: ['docs/**/*.md']

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: python tools/build_search_index.py > search_index.json
      - run: |
          git config user.name "Index Bot"
          git add search_index.json
          git commit -m "Update search index [skip ci]" || true
          git push
