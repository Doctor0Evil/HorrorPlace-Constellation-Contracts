name: AI Artifact Cap Enforcer (Reusable)

on:
  workflow_call:
    inputs:
      max_artifacts_per_repo:
        description: "Maximum number of new/modified artifacts allowed per repo per authoring request"
        required: false
        type: number
        default: 3
      authoring_request_id_field:
        description: "JSON field name containing the authoring request ID in artifact metadata"
        required: false
        type: string
        default: "authoringRequestId"
      prism_meta_field:
        description: "Field name for prismMeta block containing repo/target_path"
        required: false
        type: string
        default: "prismMeta"

jobs:
  enforce-artifact-caps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema pyyaml

      - name: Enforce per-repo artifact caps
        run: |
          python - << 'PYCODE'
          import json
          import sys
          import subprocess
          from pathlib import Path
          from collections import defaultdict

          MAX_PER_REPO = ${{ inputs.max_artifacts_per_repo }}
          REQ_ID_FIELD = "${{ inputs.authoring_request_id_field }}"
          PRISM_META_FIELD = "${{ inputs.prism_meta_field }}"

          def get_changed_files():
              """Get list of changed files in this PR/commit."""
              result = subprocess.run(
                  ["git", "diff", "--name-only", "--diff-filter=ACMRT", "HEAD^", "HEAD"],
                  capture_output=True, text=True, check=True
              )
              return [f.strip() for f in result.stdout.split("\n") if f.strip()]

          def extract_authoring_request_id(filepath):
              """Extract authoringRequestId from file metadata if present."""
              try:
                  with open(filepath, "r", encoding="utf-8") as f:
                      # Try JSON first
                      if filepath.endswith(".json"):
                          data = json.load(f)
                          # Check root level
                          if REQ_ID_FIELD in data:
                              return data[REQ_ID_FIELD]
                          # Check prismMeta
                          if PRISM_META_FIELD in data and isinstance(data[PRISM_META_FIELD], dict):
                              if REQ_ID_FIELD in data[PRISM_META_FIELD]:
                                  return data[PRISM_META_FIELD][REQ_ID_FIELD]
                      # Try YAML frontmatter for markdown
                      elif filepath.endswith(".md"):
                          content = f.read()
                          if content.startswith("---"):
                              parts = content.split("---", 2)
                              if len(parts) >= 3:
                                  import yaml
                                  frontmatter = yaml.safe_load(parts[1])
                                  if frontmatter and REQ_ID_FIELD in frontmatter:
                                      return frontmatter[REQ_ID_FIELD]
                  return None
              except Exception:
                  return None

          def infer_repo_from_path(filepath):
              """Infer target repo from filepath using known patterns."""
              # Map path prefixes to logical repo names
              path_lower = filepath.lower()
              if "/schemas/" in path_lower or "/registry/" in path_lower:
                  if "atrocity-seeds" in path_lower:
                      return "HorrorPlace-Atrocity-Seeds"
                  elif "constellation" in path_lower:
                      return "HorrorPlace-Constellation-Contracts"
                  else:
                      return "Horror.Place"
              elif "/events/" in path_lower or "/regions/" in path_lower:
                  return "HorrorPlace-Atrocity-Seeds"
              elif "/engine/" in path_lower or "/lua/" in path_lower:
                  return "HorrorPlace-Codebase-of-Death"
              elif "/contracts/" in path_lower:
                  return "HorrorPlace-Black-Archivum"
              # Default fallback
              return "unknown"

          # Collect changed files grouped by authoring request ID and repo
          artifacts_by_request = defaultdict(lambda: defaultdict(list))

          for filepath in get_changed_files():
              req_id = extract_authoring_request_id(filepath)
              if not req_id:
                  continue  # Skip files not part of an authoring request

              repo = infer_repo_from_path(filepath)
              if repo == "unknown":
                  continue

              artifacts_by_request[req_id][repo].append(filepath)

          # Check caps
          errors = []
          for req_id, repo_counts in artifacts_by_request.items():
              for repo, files in repo_counts.items():
                  if len(files) > MAX_PER_REPO:
                      errors.append({
                          "authoringRequestId": req_id,
                          "repo": repo,
                          "count": len(files),
                          "max": MAX_PER_REPO,
                          "files": files
                      })

          if errors:
              print("❌ ARTIFACT CAP EXCEEDED:", file=sys.stderr)
              for err in errors:
                  print(f"  Request {err['authoringRequestId']}: {err['repo']} has {err['count']} artifacts (max {err['max']})", file=sys.stderr)
                  for f in err["files"]:
                      print(f"    - {f}", file=sys.stderr)
              # Output structured error for CHATDIRECTOR parsing
              print("\nSTRUCTURED_ERROR:", file=sys.stderr)
              print(json.dumps({
                  "code": "ERR_ARTIFACT_CAP_EXCEEDED",
                  "details": errors
              }, indent=2), file=sys.stderr)
              sys.exit(1)
          else:
              print(f"✅ All authoring requests respect artifact cap of {MAX_PER_REPO} per repo")
              sys.exit(0)
          PYCODE
